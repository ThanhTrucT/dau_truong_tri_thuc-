<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Quản Lý Kết Quả - Đấu Trường Tri Thức</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(125deg, #0f2027, #203a43, #2c5364, #134e5e, #71b280);
            background-size: 400% 400%;
            animation: aurora 15s ease infinite;
            color: #f8fafc;
            min-height: 100vh;
            padding: 30px 20px;
        }

        @keyframes aurora {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(120deg, #a8ff78, #78ffd6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* STATS SUMMARY */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .summary-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
        }

        .summary-value {
            font-size: 32px;
            font-weight: 800;
            color: #78ffd6;
        }

        .summary-label {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* TOOLBAR */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-input {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            padding: 9px 16px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            width: 220px;
            transition: border-color 0.2s;
        }

        .search-input::placeholder { color: rgba(255,255,255,0.3); }
        .search-input:focus { border-color: #78ffd6; }

        .sort-select {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            padding: 9px 14px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
        }

        .sort-select option { background: #1e293b; }

        .btn-refresh {
            background: rgba(120,255,214,0.15);
            border: 1px solid rgba(120,255,214,0.3);
            color: #78ffd6;
            padding: 9px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-refresh:hover { background: rgba(120,255,214,0.25); }

        .btn-export {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            border: none;
            color: #fff;
            padding: 9px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-export:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-export:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* TABLE */
        .table-wrapper {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: rgba(120,255,214,0.1);
        }

        th {
            padding: 14px 18px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #78ffd6;
            text-align: left;
            white-space: nowrap;
        }

        td {
            padding: 13px 18px;
            font-size: 14px;
            color: #e2e8f0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        tbody tr:last-child td { border-bottom: none; }

        tbody tr:hover td { background: rgba(255,255,255,0.04); }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-weight: 800;
            font-size: 13px;
        }

        .rank-1 { background: rgba(241,196,15,0.2); color: #f1c40f; }
        .rank-2 { background: rgba(189,195,199,0.2); color: #bdc3c7; }
        .rank-3 { background: rgba(230,126,34,0.2); color: #e67e22; }
        .rank-other { background: rgba(255,255,255,0.08); color: #94a3b8; }

        .score-highlight {
            font-weight: 700;
            color: #78ffd6;
        }

        .level-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .level-excellent { background: rgba(46,204,113,0.2); color: #2ecc71; }
        .level-good { background: rgba(52,152,219,0.2); color: #3498db; }
        .level-average { background: rgba(243,156,18,0.2); color: #f39c18; }
        .level-weak { background: rgba(231,76,60,0.2); color: #e74c3c; }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #64748b;
        }

        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 15px; }

        .loading {
            text-align: center;
            padding: 50px;
            color: #78ffd6;
            font-size: 16px;
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(120,255,214,0.3);
            border-top-color: #78ffd6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .status-bar {
            text-align: center;
            font-size: 13px;
            color: #64748b;
            margin-top: 16px;
        }

        .status-bar span { color: #78ffd6; font-weight: 600; }

        @media (max-width: 600px) {
            .summary-cards { grid-template-columns: 1fr 1fr; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar-left { flex-direction: column; }
            .search-input { width: 100%; }
            th, td { padding: 10px 12px; font-size: 13px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Quản Lý Kết Quả Học Tập</h1>
    <p class="subtitle">Đấu Trường Tri Thức — Theo dõi điểm tích lũy của học sinh</p>

    <!-- Thống kê tổng -->
    <div class="summary-cards">
        <div class="summary-card">
            <div class="summary-value" id="stat-total-students">—</div>
            <div class="summary-label">Tổng học sinh</div>
        </div>
        <div class="summary-card">
            <div class="summary-value" id="stat-total-games">—</div>
            <div class="summary-label">Tổng lượt chơi</div>
        </div>
        <div class="summary-card">
            <div class="summary-value" id="stat-avg-score">—</div>
            <div class="summary-label">Điểm TB / học sinh</div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-left">
            <input type="text" class="search-input" id="search-input" placeholder="🔍 Tìm kiếm học sinh..." oninput="filterTable()">
            <select class="sort-select" id="sort-select" onchange="sortTable()">
                <option value="total_score_desc">Tổng điểm ↓</option>
                <option value="total_score_asc">Tổng điểm ↑</option>
                <option value="games_played_desc">Lượt chơi ↓</option>
                <option value="best_score_desc">Điểm cao nhất ↓</option>
                <option value="display_name_asc">Tên A→Z</option>
            </select>
            <button class="btn-refresh" onclick="loadData()">🔄 Làm mới</button>
        </div>
        <button class="btn-export" id="btn-export" onclick="exportExcel()" disabled>
            📥 Xuất Excel
        </button>
    </div>

    <!-- Bảng dữ liệu -->
    <div class="table-wrapper">
        <div id="table-area">
            <div class="loading"><span class="spinner"></span> Đang tải dữ liệu...</div>
        </div>
    </div>

    <div class="status-bar" id="status-bar"></div>
</div>

<script>
    const SUPABASE_URL = 'https://zvmzfckngasuygbavqdh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_V2eEhkNqjSvmVD6U-cJd8w_RMEQWFtj';

    let allData = [];
    let filteredData = [];

    async function sbFetch(path) {
        const res = await fetch(SUPABASE_URL + path, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Content-Type': 'application/json'
            }
        });
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    async function loadData() {
        document.getElementById('table-area').innerHTML = '<div class="loading"><span class="spinner"></span> Đang tải dữ liệu...</div>';
        document.getElementById('btn-export').disabled = true;
        document.getElementById('status-bar').innerText = '';

        try {
            const data = await sbFetch('/rest/v1/users_key?select=username,display_name,total_score,games_played,best_score,created_at,last_played&order=total_score.desc');
            allData = data || [];
            filteredData = [...allData];
            updateSummary();
            renderTable();
            document.getElementById('btn-export').disabled = false;
            document.getElementById('status-bar').innerHTML = `Cập nhật lúc <span>${new Date().toLocaleTimeString('vi-VN')}</span> — <span>${allData.length}</span> học sinh`;
        } catch(e) {
            document.getElementById('table-area').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Không thể tải dữ liệu. Vui lòng kiểm tra kết nối.<br><small style="color:#475569">${e.message}</small></p></div>`;
        }
    }

    function updateSummary() {
        const total = allData.length;
        const totalGames = allData.reduce((s, u) => s + (u.games_played || 0), 0);
        const avgScore = total > 0 ? Math.round(allData.reduce((s, u) => s + (u.total_score || 0), 0) / total) : 0;
        document.getElementById('stat-total-students').innerText = total;
        document.getElementById('stat-total-games').innerText = totalGames;
        document.getElementById('stat-avg-score').innerText = avgScore;
    }

    function getLevel(score, games) {
        if (games === 0) return { text: 'Chưa chơi', cls: 'level-weak' };
        const avg = score / games;
        if (avg >= 180) return { text: '🏅 Xuất sắc', cls: 'level-excellent' };
        if (avg >= 130) return { text: '🥈 Khá tốt', cls: 'level-good' };
        if (avg >= 80) return { text: '🥉 Trung bình', cls: 'level-average' };
        return { text: '📚 Cần ôn luyện', cls: 'level-weak' };
    }

    function formatDate(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        return d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    }

    function renderTable() {
        if (filteredData.length === 0) {
            document.getElementById('table-area').innerHTML = '<div class="empty-state"><div class="icon">🎓</div><p>Không tìm thấy học sinh nào</p></div>';
            return;
        }

        const rows = filteredData.map((u, i) => {
            const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
            const rankText = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;
            const level = getLevel(u.total_score || 0, u.games_played || 0);
            const avgPerGame = u.games_played > 0 ? Math.round((u.total_score || 0) / u.games_played) : 0;

            return `<tr>
                <td><span class="rank-badge ${rankClass}">${rankText}</span></td>
                <td><strong>${u.display_name}</strong><br><small style="color:#64748b">@${u.username}</small></td>
                <td class="score-highlight">${(u.total_score || 0).toLocaleString()}</td>
                <td>${u.games_played || 0}</td>
                <td>${u.best_score || 0}</td>
                <td>${avgPerGame}</td>
                <td><span class="level-badge ${level.cls}">${level.text}</span></td>
                <td style="font-size:12px; color:#64748b">${formatDate(u.last_played)}</td>
            </tr>`;
        }).join('');

        document.getElementById('table-area').innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Học sinh</th>
                        <th>Tổng điểm</th>
                        <th>Lượt chơi</th>
                        <th>Điểm cao nhất</th>
                        <th>TB/Lượt</th>
                        <th>Xếp loại</th>
                        <th>Lần chơi cuối</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    function filterTable() {
        const keyword = document.getElementById('search-input').value.toLowerCase();
        filteredData = allData.filter(u =>
            u.display_name.toLowerCase().includes(keyword) ||
            u.username.toLowerCase().includes(keyword)
        );
        sortTable(false);
        renderTable();
    }

    function sortTable(rerender = true) {
        const val = document.getElementById('sort-select').value;
        filteredData.sort((a, b) => {
            if (val === 'total_score_desc') return (b.total_score || 0) - (a.total_score || 0);
            if (val === 'total_score_asc') return (a.total_score || 0) - (b.total_score || 0);
            if (val === 'games_played_desc') return (b.games_played || 0) - (a.games_played || 0);
            if (val === 'best_score_desc') return (b.best_score || 0) - (a.best_score || 0);
            if (val === 'display_name_asc') return a.display_name.localeCompare(b.display_name, 'vi');
            return 0;
        });
        if (rerender) renderTable();
    }

    function exportExcel() {
        if (filteredData.length === 0) return;

        const wb = XLSX.utils.book_new();

        // Sheet 1: Danh sách chi tiết
        const headers = ['STT', 'Họ và Tên', 'Tên Đăng Nhập', 'Tổng Điểm Tích Lũy', 'Số Lượt Chơi', 'Điểm Cao Nhất', 'TB Điểm/Lượt', 'Xếp Loại', 'Lần Chơi Cuối'];
        const rows = filteredData.map((u, i) => {
            const level = getLevel(u.total_score || 0, u.games_played || 0);
            const avg = u.games_played > 0 ? Math.round((u.total_score || 0) / u.games_played) : 0;
            return [
                i + 1,
                u.display_name,
                u.username,
                u.total_score || 0,
                u.games_played || 0,
                u.best_score || 0,
                avg,
                level.text.replace(/[🏅🥈🥉📚]/g, '').trim(),
                u.last_played ? new Date(u.last_played).toLocaleString('vi-VN') : 'Chưa chơi'
            ];
        });

        const ws1 = XLSX.utils.aoa_to_sheet([headers, ...rows]);

        // Định dạng cột rộng
        ws1['!cols'] = [
            {wch: 5}, {wch: 22}, {wch: 18}, {wch: 20}, {wch: 14},
            {wch: 16}, {wch: 14}, {wch: 16}, {wch: 22}
        ];

        XLSX.utils.book_append_sheet(wb, ws1, 'Kết Quả Học Tập');

        // Sheet 2: Thống kê tổng hợp
        const totalStudents = allData.length;
        const totalGames = allData.reduce((s, u) => s + (u.games_played || 0), 0);
        const avgScore = totalStudents > 0 ? Math.round(allData.reduce((s, u) => s + (u.total_score || 0), 0) / totalStudents) : 0;
        const topStudent = allData[0];

        const excellent = allData.filter(u => u.games_played > 0 && (u.total_score / u.games_played) >= 180).length;
        const good = allData.filter(u => u.games_played > 0 && (u.total_score / u.games_played) >= 130 && (u.total_score / u.games_played) < 180).length;
        const average = allData.filter(u => u.games_played > 0 && (u.total_score / u.games_played) >= 80 && (u.total_score / u.games_played) < 130).length;
        const weak = allData.filter(u => u.games_played > 0 && (u.total_score / u.games_played) < 80).length;
        const notPlayed = allData.filter(u => !u.games_played || u.games_played === 0).length;

        const statsData = [
            ['THỐNG KÊ TỔNG HỢP', ''],
            ['Thời gian xuất', new Date().toLocaleString('vi-VN')],
            ['', ''],
            ['Tổng số học sinh', totalStudents],
            ['Tổng lượt chơi', totalGames],
            ['Điểm TB mỗi học sinh', avgScore],
            ['Học sinh dẫn đầu', topStudent ? topStudent.display_name : '—'],
            ['Điểm cao nhất', topStudent ? topStudent.total_score : 0],
            ['', ''],
            ['PHÂN LOẠI HỌC SINH', ''],
            ['Xuất sắc (TB ≥ 180đ/lượt)', excellent],
            ['Khá tốt (TB 130–179đ/lượt)', good],
            ['Trung bình (TB 80–129đ/lượt)', average],
            ['Cần ôn luyện (TB < 80đ/lượt)', weak],
            ['Chưa tham gia', notPlayed],
        ];

        const ws2 = XLSX.utils.aoa_to_sheet(statsData);
        ws2['!cols'] = [{wch: 30}, {wch: 25}];
        XLSX.utils.book_append_sheet(wb, ws2, 'Thống Kê Tổng Hợp');

        const filename = `ket_qua_hoc_tap_${new Date().toISOString().slice(0,10)}.xlsx`;
        XLSX.writeFile(wb, filename);
    }

    // Tự động tải khi mở trang
    loadData();
</script>
</body>
</html>
